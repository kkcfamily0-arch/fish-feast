&lt;div id=&quot;fish-feast&quot; class=&quot;fish-game&quot;&gt;

  &lt;/div&gt;

    &lt;canvas id=&quot;fish-canvas&quot; role=&quot;img&quot; aria-label=&quot;물고기 먹기 게임. 화면을 누른 뒤 손가락을 움직여 내 물고기의 이동 방향을 정하세요.&quot;&gt;&lt;/canvas&gt;

  &lt;script&gt;
    (() =&gt; {

        ctx.fillStyle = mine ? css(&#x27;--viz-series-1&#x27;) : css(f.color); ctx.beginPath(); ctx.ellipse(0,0,r*1.25,r*.72,0,0,Math.PI*2); ctx.fill();

        ctx.fillStyle = css(&#x27;--foreground&#x27;); ctx.beginPath(); ctx.arc(r*.55,-r*.2,Math.max(2,r*.12),0,Math.PI*2); ctx.fill();

        ctx.save(); ctx.globalAlpha = .35; ctx.fillStyle = css(&#x27;--foreground&#x27;); ctx.beginPath(); ctx.arc(joystick.x, joystick.y, reach, 0, Math.PI * 2); ctx.fill();
        ctx.globalAlpha = .72; ctx.fillStyle = css(&#x27;--viz-series-1&#x27;); ctx.beginPath(); ctx.arc(x, y, 19, 0, Math.PI * 2); ctx.fill(); ctx.restore();
      }
      function end(win) { running=false; resultEl.textContent=win ? &#x27;모든 물고기를 먹었어요!&#x27; : &#x27;큰 물고기에게 잡혔어요&#x27;; overlay.hidden=false; statusEl.textContent=win ? &#x27;승리!&#x27; : &#x27;게임 오버&#x27;; }
      function loop(now) {

      }

      function point(event) { const rect = canvas.getBoundingClientRect(); return { x:event.clientX-rect.left, y:event.clientY-rect.top }; }

    window.crypto?.randomUUID?.() ?? Date.now().toString(36)

  const hoverDelay = 700;
  const skipDelay = 300;

  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest(&quot;[data-tooltip]&quot;)
      : null;
  const containsTarget = (trigger, target) =&gt;
    target?.nodeType != null &amp;&amp; trigger.contains(target);

    trigger.getAttribute(&quot;data-tooltip&quot;)?.trim() ?? &quot;&quot;;

    const placement = trigger.getAttribute(&quot;data-tooltip-placement&quot;);
